# =============================================================================
# Atomic Release Workflow (Reusable)
# =============================================================================
#
# This reusable workflow handles the packaging and publishing process.
#
# Strategy: Build with --publish never, then upload via softprops/action-gh-release
# This avoids electron-builder's buggy GitHub upload mechanism that causes
# "already_exists" errors on blockmap files.
#
# =============================================================================

name: Release (Reusable)

on:
    workflow_call:

# =============================================================================
# Permissions
# =============================================================================
# Restrict default GITHUB_TOKEN permissions (OpenSSF Scorecard best practice)
# Jobs declare their own permissions as needed
permissions: {}

env:
    NODE_VERSION: '20'
    CI: true
    ELECTRON_ENABLE_LOGGING: true
    npm_config_fetch_retries: '3'
    npm_config_fetch_retry_mintimeout: '10000'
    npm_config_fetch_retry_maxtimeout: '60000'

jobs:
    # ==========================================================================
    # macOS x64 Build
    # ==========================================================================
    macos-x64:
        name: macOS (x64)
        runs-on: macos-latest
        permissions:
            contents: write # Required for release upload
        env:
            npm_config_arch: x64
        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            - name: Build (without publish)
              run: npm run dist:mac-x64

            - name: Generate Checksums
              run: |
                  cd release
                  shasum -a 256 *.dmg *.zip > checksums-macos-x64.txt

            - name: Prepare macOS update metadata (x64)
              run: |
                  cd release
                  if [ ! -f latest-mac.yml ]; then
                    echo "Error: expected latest-mac.yml to be generated, but it was not found in the release directory."
                    exit 1
                  fi
                  mv latest-mac.yml latest-mac-x64.yml

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
              with:
                  draft: true
                  fail_on_unmatched_files: true
                  files: |
                      release/*.dmg
                      release/*.zip
                      release/*.zip.blockmap
                      release/checksums-macos-x64.txt
                      release/latest-mac-x64.yml
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
              with:
                  name: release-artifacts-macos-x64
                  path: release/
                  retention-days: 7
                  if-no-files-found: error

    # ==========================================================================
    # macOS arm64 Build
    # ==========================================================================
    macos-arm64:
        name: macOS (arm64)
        runs-on: macos-latest
        permissions:
            contents: write # Required for release upload
        env:
            npm_config_arch: arm64
        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            - name: Build (without publish)
              run: npm run dist:mac-arm64

            - name: Generate Checksums
              run: |
                  cd release
                  shasum -a 256 *.dmg *.zip > checksums-macos-arm64.txt

            - name: Prepare macOS update metadata (arm64)
              run: |
                  cd release
                  if [ ! -f latest-mac.yml ]; then
                    echo "Error: expected latest-mac.yml to be generated, but it was not found in the release directory."
                    exit 1
                  fi
                  mv latest-mac.yml latest-mac-arm64.yml

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
              with:
                  draft: true
                  fail_on_unmatched_files: true
                  files: |
                      release/*.dmg
                      release/*.zip
                      release/*.zip.blockmap
                      release/checksums-macos-arm64.txt
                      release/latest-mac-arm64.yml
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
              with:
                  name: release-artifacts-macos-arm64
                  path: release/
                  retention-days: 7
                  if-no-files-found: error

    windows-x64:
        name: Windows (x64)
        runs-on: windows-latest
        permissions:
            contents: write # Required for release upload
        env:
            npm_config_arch: x64
        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            - name: Build Windows x64 updater installer
              run: npm run dist:win:bridge:x64
              shell: bash
              env:
                  AZURE_SIGN_ENDPOINT: ${{ secrets.AZURE_SIGN_ENDPOINT }}
                  AZURE_PUBLISHER_NAME: ${{ secrets.AZURE_PUBLISHER_NAME }}
                  AZURE_CODE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_ACCOUNT_NAME }}
                  AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
                  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
                  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

            - name: Build promoted unified Windows installer
              run: npm run dist:win:bridge:unified
              shell: bash
              env:
                  AZURE_SIGN_ENDPOINT: ${{ secrets.AZURE_SIGN_ENDPOINT }}
                  AZURE_PUBLISHER_NAME: ${{ secrets.AZURE_PUBLISHER_NAME }}
                  AZURE_CODE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_ACCOUNT_NAME }}
                  AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
                  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
                  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

            - name: Run Release E2E Tests
              run: npm run test:e2e:release
              shell: bash
              timeout-minutes: 30

            - name: Resolve previous x64 installer for upgrade validation
              run: |
                  set -euo pipefail
                  previous_tag="$(gh release list --exclude-drafts --exclude-pre-releases --limit 10 --json tagName --jq '.[] | select(.tagName != env.GITHUB_REF_NAME) | .tagName' | head -n 1)"
                  if [ -z "$previous_tag" ]; then
                    echo 'Failed to resolve a previous release tag for x64 upgrade validation.' >&2
                    exit 1
                  fi

                  mkdir -p release/baseline-x64
                  gh release download "$previous_tag" --pattern 'Gemini-Desktop-*-x64-installer.exe' --dir release/baseline-x64

                  baseline_installer="$(compgen -G 'release/baseline-x64/Gemini-Desktop-*-x64-installer.exe' | head -n 1 || true)"
                  if [ -z "$baseline_installer" ]; then
                    echo 'Failed to download a previous x64 installer for upgrade validation.' >&2
                    exit 1
                  fi

                  {
                    printf 'TARGET_VERSION=%s\n' "${GITHUB_REF_NAME#v}"
                    printf 'WINDOWS_BASELINE_INSTALLER=%s\n' "$baseline_installer"
                    printf 'WINDOWS_BASELINE_VERSION=%s\n' "${previous_tag#v}"
                  } >> "$GITHUB_ENV"
              shell: bash
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Install promoted Windows installer for smoke lane
              run: |
                  $installer = Get-ChildItem -Path release/Gemini-Desktop-*-installer.exe -File | Where-Object { $_.Name -notlike '*-x64-installer.exe' -and $_.Name -notlike '*-arm64-installer.exe' } | Select-Object -First 1 -ExpandProperty FullName
                  if (-not $installer) { throw 'Promoted unified installer not found for installer smoke lane.' }
                  ./scripts/windows/install-and-launch.ps1 -InstallerPath $installer -InstallDir "$env:TEMP\gemini-desktop-installer-smoke\Gemini Desktop"
              shell: pwsh

            - name: Run Windows installer smoke test (x64)
              run: npm run test:e2e:release:installer -- --spec=tests/e2e/release/windows-installer-smoke.spec.ts
              shell: bash
              timeout-minutes: 30

            - name: Install previous x64 baseline build
              run: |
                  if (-not $env:WINDOWS_BASELINE_INSTALLER) { throw 'WINDOWS_BASELINE_INSTALLER was not set for x64 upgrade validation.' }
                  ./scripts/windows/install-and-launch.ps1 -InstallerPath $env:WINDOWS_BASELINE_INSTALLER -InstallDir "$env:TEMP\gemini-desktop-installer-smoke\Gemini Desktop" -SkipLaunch
              shell: pwsh

            - name: Upgrade baseline install to promoted Windows installer (x64)
              run: |
                  $installer = Get-ChildItem -Path release/Gemini-Desktop-*-installer.exe -File | Where-Object { $_.Name -notlike '*-x64-installer.exe' -and $_.Name -notlike '*-arm64-installer.exe' } | Select-Object -First 1 -ExpandProperty FullName
                  if (-not $installer) { throw 'Promoted unified installer not found for x64 upgrade validation.' }
                  ./scripts/windows/install-and-launch.ps1 -InstallerPath $installer -InstallDir "$env:TEMP\gemini-desktop-installer-smoke\Gemini Desktop"
              shell: pwsh

            - name: Run Windows installer upgrade test (x64)
              run: npm run test:e2e:release:installer -- --spec=tests/e2e/release/windows-upgrade-x64.spec.ts
              shell: bash
              timeout-minutes: 30
              env:
                  TARGET_VERSION: ${{ env.TARGET_VERSION }}
                  WINDOWS_BASELINE_INSTALLER: ${{ env.WINDOWS_BASELINE_INSTALLER }}
                  WINDOWS_BASELINE_VERSION: ${{ env.WINDOWS_BASELINE_VERSION }}

            - name: Prepare Windows update metadata (x64)
              run: |
                  cd release
                  if (!(Test-Path latest.yml)) { throw 'Error: expected latest.yml to be generated by the x64 updater lane.' }
                  Copy-Item -Path latest.yml -Destination latest-x64.yml -Force
                  # TODO(v0.10.x cleanup): Remove legacy x64.yml/arm64.yml aliases after ~3-4 releases past v0.10.1,
                  # once the installed base has moved off v0.10.0 and no longer requests arch-only channel files.
                  Copy-Item -Path latest-x64.yml -Destination x64.yml -Force
              shell: pwsh

            - name: Generate Checksums (x64 lane)
              run: |
                  cd release
                  $files = @(Get-ChildItem -Path 'Gemini-Desktop-*-installer.exe' -File | Where-Object { $_.Name -notlike '*-arm64-installer.exe' })
                  if ($files.Count -lt 2) { throw 'Expected the x64 lane to own both the x64 updater installer and promoted unified installer.' }
                  $files | Get-FileHash -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" } | Out-File checksums-windows-x64.txt
              shell: pwsh

            - name: Validate Windows update metadata (x64)
              run: node scripts/validate-windows-release-metadata.cjs --lane x64 --release-dir release
              shell: bash

            - name: Prepare validated upload set (x64)
              run: |
                  $manifest = Get-Content release/windows-release-manifest-x64.json | ConvertFrom-Json
                  $uploadDir = Join-Path release upload-x64
                  New-Item -ItemType Directory -Force -Path $uploadDir | Out-Null
                  foreach ($file in $manifest.uploadFiles) {
                    Copy-Item -Path (Join-Path release $file) -Destination (Join-Path $uploadDir (Split-Path $file -Leaf)) -Force
                  }
              shell: pwsh

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
              with:
                  draft: true
                  fail_on_unmatched_files: true
                  files: |
                      release/upload-x64/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
              with:
                  name: release-artifacts-windows-x64
                  path: release/
                  retention-days: 7
                  if-no-files-found: error

    windows-arm64:
        name: Windows (arm64)
        runs-on: windows-latest
        permissions:
            contents: write # Required for release upload
        env:
            npm_config_arch: arm64
        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            - name: Build Windows arm64 updater installer
              run: npm run dist:win:bridge:arm64
              shell: bash
              env:
                  AZURE_SIGN_ENDPOINT: ${{ secrets.AZURE_SIGN_ENDPOINT }}
                  AZURE_PUBLISHER_NAME: ${{ secrets.AZURE_PUBLISHER_NAME }}
                  AZURE_CODE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_ACCOUNT_NAME }}
                  AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
                  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
                  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

            - name: Prepare Windows update metadata (arm64)
              run: |
                  cd release
                  if (!(Test-Path latest.yml)) { throw 'Error: expected latest.yml to be generated by the arm64 updater lane.' }
                  # TODO(v0.10.x cleanup): Remove legacy x64.yml/arm64.yml aliases after ~3-4 releases past v0.10.1,
                  # once the installed base has moved off v0.10.0 and no longer requests arch-only channel files.
                  Copy-Item -Path latest.yml -Destination latest-arm64.yml -Force
                  Copy-Item -Path latest-arm64.yml -Destination arm64.yml -Force
              shell: pwsh

            - name: Generate Checksums (arm64 lane)
              run: |
                  cd release
                  $files = @(Get-ChildItem -Path '*-arm64-installer.exe' -File)
                  if ($files.Count -eq 0) { throw 'No ARM64 installer files found in release/ for checksum generation.' }
                  $files | Get-FileHash -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" } | Out-File checksums-windows-arm64.txt
              shell: pwsh

            - name: Validate Windows update metadata (arm64)
              run: node scripts/validate-windows-release-metadata.cjs --lane arm64 --release-dir release
              shell: bash

            - name: Attach ARM64 validation gate reminder
              run: |
                  Write-Host 'ARM64 validation must run on Windows-on-ARM hardware or a documented manual gate before publication.'
                  Write-Host 'Keep the GitHub release draft until ARM64 evidence is attached.'
              shell: pwsh

            - name: Prepare validated upload set (arm64)
              run: |
                  $manifest = Get-Content release/windows-release-manifest-arm64.json | ConvertFrom-Json
                  $uploadDir = Join-Path release upload-arm64
                  New-Item -ItemType Directory -Force -Path $uploadDir | Out-Null
                  foreach ($file in $manifest.uploadFiles) {
                    Copy-Item -Path (Join-Path release $file) -Destination (Join-Path $uploadDir (Split-Path $file -Leaf)) -Force
                  }
              shell: pwsh

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
              with:
                  draft: true
                  fail_on_unmatched_files: true
                  files: |
                      release/upload-arm64/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
              with:
                  name: release-artifacts-windows-arm64
                  path: release/
                  retention-days: 7
                  if-no-files-found: error

    # ==========================================================================
    # Linux Build
    # ==========================================================================
    linux:
        name: Linux (x64)
        runs-on: ubuntu-latest
        permissions:
            contents: write # Required for release upload
        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install Dependencies
              uses: ./.github/actions/retry-command
              with:
                  command: npm ci --prefer-offline

            - name: Download Frontend Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: frontend-dist
                  path: dist/

            - name: Download Electron Build
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: electron-dist
                  path: dist-electron/

            - name: Build (without publish)
              run: npm run dist:linux

            - name: Run Release E2E Tests
              run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npm run test:e2e:release

            - name: Generate Checksums
              run: |
                  cd release
                  sha256sum *.AppImage *.deb *.rpm *.tar.gz > checksums-linux.txt

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
              with:
                  draft: true
                  fail_on_unmatched_files: true
                  files: |
                      release/*.AppImage
                      release/*.deb
                      release/*.rpm
                      release/*.tar.gz
                      release/latest-linux.yml
                      release/checksums-linux.txt
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
              with:
                  name: release-artifacts-linux
                  path: release/
                  retention-days: 7
                  if-no-files-found: error
